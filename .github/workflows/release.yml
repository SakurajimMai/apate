name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: apate-${{ github.ref_name }}-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: apate-${{ github.ref_name }}-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p apate-cli

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Force $dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\apate.exe" "$dist\apate.exe"
          Compress-Archive -Path "$dist\*" -DestinationPath "${{ matrix.archive }}" -Force

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/apate dist/apate
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  android:
    name: build android apk
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      CARGO_NDK_PLATFORM: 26
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"

      - name: Export Android NDK path
        shell: bash
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Decode optional Android release keystore
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] \
            && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] \
            && [ -n "${ANDROID_KEY_ALIAS:-}" ] \
            && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            mkdir -p android-signing
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-signing/apate-release.jks
          else
            echo "::notice::Android signing secrets are not configured. Gradle will use debug signing for manual sideloading."
          fi

      - name: Build Android native libraries
        shell: bash
        run: |
          set -euo pipefail
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -t x86 \
            -t x86_64 \
            -o android/app/src/main/jniLibs \
            build --manifest-path crates/apate-android-jni/Cargo.toml --release --locked

      - name: Build Android APK
        working-directory: android
        run: gradle :app:assembleRelease

      - name: Rename Android APK
        shell: bash
        run: |
          set -euo pipefail
          cp android/app/build/outputs/apk/release/app-release.apk "apate-${{ github.ref_name }}-android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: apate-${{ github.ref_name }}-android.apk
          path: apate-${{ github.ref_name }}-android.apk

  release:
    name: create release
    needs: [build, android]
    if: always() && needs.build.result == 'success' && needs.android.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^## / {
              if (found) exit
              if ($0 ~ /^## Unreleased/) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish latest prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

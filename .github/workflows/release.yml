name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            archive: apate-${{ github.ref_name }}-windows-x86_64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: apate-${{ github.ref_name }}-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p apate-cli

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Force $dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\apate.exe" "$dist\apate.exe"
          Copy-Item "CHANGELOG.md" "$dist\CHANGELOG.md"
          Compress-Archive -Path "$dist\*" -DestinationPath "${{ matrix.archive }}" -Force

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/apate dist/apate
          cp CHANGELOG.md dist/CHANGELOG.md
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^## / {
              if (found) exit
              if ($0 ~ /^## Unreleased/) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish latest prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
